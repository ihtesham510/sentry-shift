name: sentry-shift

services:
  minio:
    image: minio/minio:latest
    container_name: sentry-shift-minio
    ports:
      - "7000:7000"
      - "7001:7001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --address ":7000" --console-address ":7001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    container_name: sentry-shift-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:7000 minioadmin minioadmin;
      mc mb -p local/my-bucket;
      mc anonymous set download local/my-bucket;
      exit 0;
      "
volumes:
  minio_data:
